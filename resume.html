<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人履歷</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
    }

    .container {
      max-width: 900px;
      margin: 50px auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
      overflow: hidden;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      background: #6366f1;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    .header img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid white;
      margin-bottom: 15px;
    }

    .header h1 {
      margin: 10px 0 5px;
      font-size: 28px;
    }

    .header p {
      margin: 0;
      opacity: 0.9;
    }

    .content {
      padding: 30px;
    }

    .section {
      margin-bottom: 25px;
    }

    .section h2 {
      color: #6366f1;
      margin-bottom: 10px;
      border-left: 5px solid #6366f1;
      padding-left: 10px;
    }

    .tag {
      display: inline-block;
      background: #eef2ff;
      color: #4338ca;
      padding: 6px 12px;
      border-radius: 12px;
      margin: 5px;
      font-size: 14px;
      transition: 0.3s;
    }

    .tag:hover {
      background: #6366f1;
      color: white;
    }

    button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      background: #4338ca;
    }

    .hidden {
      display: none;
      margin-top: 10px;
      color: #555;
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>

<body>

<!--
  📌 使用說明：
  1. 建立資料夾 images
  2. 將你的照片命名為 profile.png
  3. 放到 images/profile.png
-->

<div class="container">
  <div class="header">
    <img src="images/profile.png" alt="個人照片">

    <h1>學號：114018093</h1>
    <p>亞洲大學｜聽力暨語言治療學系</p>
  </div>

  <div class="content">

    <div class="section">
      <h2>個人簡介</h2>
      <p>
        我是一位富有創造力且充滿熱情的人，MBTI 為 ENFP。
        擅長觀察與體會他人的情緒與需求，對於人際互動與溝通具有高度敏感度。
      </p>
    </div>

    <div class="section">
      <h2>興趣</h2>
      <span class="tag">寫小說</span>
      <span class="tag">跳舞</span>
    </div>

    <div class="section">
      <h2>人格特質</h2>
      <span class="tag">創造力</span>
      <span class="tag">同理心</span>
      <span class="tag">熱情</span>
      <span class="tag">觀察力強</span>
    </div>

    <div class="section">
      <h2>更多介紹</h2>
      <button onclick="toggleText()">點擊展開</button>
      <p id="moreText" class="hidden">
        我喜歡透過小說創作描繪角色與情感，也熱愛舞蹈帶來的自由與表達。
        在學習語言治療的過程中，我希望能將自己的觀察力與同理心應用於幫助他人。
      </p>
    </div>

  </div>

  <div class="footer">
    © 2026 個人履歷網站
  </div>
</div>

<script>
  function toggleText() {
    const text = document.getElementById("moreText");
    text.classList.toggle("hidden");
  }
</script>

</body>
</html>
