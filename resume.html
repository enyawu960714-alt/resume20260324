<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人履歷</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
    }

    .container {
      max-width: 900px;
      margin: 50px auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
      overflow: hidden;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      background: #6366f1;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    .header img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid white;
      margin-bottom: 15px;
    }

    .content {
      padding: 30px;
    }

    .section {
      margin-bottom: 25px;
    }

    .section h2 {
      color: #6366f1;
      margin-bottom: 10px;
      border-left: 5px solid #6366f1;
      padding-left: 10px;
    }

    .tag {
      display: inline-block;
      background: #eef2ff;
      color: #4338ca;
      padding: 6px 12px;
      border-radius: 12px;
      margin: 5px;
    }

    button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #888;
    }

    .music-btn {
      display: block;
      margin: 20px auto;
    }
  </style>
</head>

<body>

<!-- 🎵 音樂 -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 🎵 播放按鈕 -->
<button class="music-btn" onclick="toggleMusic()">🎵 播放 / 暫停音樂</button>

<div class="container">
  <div class="header">
    <img src="images/profile.png" alt="個人照片">
    <h1>學號：114018093</h1>
    <p>亞洲大學｜聽力暨語言治療學系</p>
  </div>

  <div class="content">

    <div class="section">
      <h2>個人簡介</h2>
      <p>
        我是一位富有創造力且充滿熱情的人，MBTI 為 ENFP。
        擅長觀察與體會他人的情緒與需求。
      </p>
    </div>

    <div class="section">
      <h2>興趣</h2>
      <span class="tag">寫小說</span>
      <span class="tag">跳舞</span>
    </div>

    <div class="section">
      <h2>人格特質</h2>
      <span class="tag">創造力</span>
      <span class="tag">同理心</span>
      <span class="tag">熱情</span>
      <span class="tag">觀察力強</span>
    </div>

    <div class="section">
      <h2>更多介紹</h2>
      <button onclick="toggleText()">點擊展開</button>
      <p id="moreText" class="hidden">
        我喜歡透過小說創作描繪角色與情感，也熱愛舞蹈帶來的自由與表達。
      </p>
    </div>

  </div>

  <div class="footer">
    © 2026 個人履歷網站
  </div>
</div>

<script>
  function toggleText() {
    document.getElementById("moreText").classList.toggle("hidden");
  }

  // 🎵 音樂控制（關鍵修正）
  const audio = document.getElementById("bgm");

  function toggleMusic() {
    if (audio.paused) {
      audio.play();
    } else {
      audio.pause();
    }
  }
</script>

</body>
</html>
